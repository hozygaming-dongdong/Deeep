<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Deeeep</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="ocean-stage" aria-label="Deep Hook Crush game">
        <canvas id="gameCanvas" width="720" height="1280"></canvas>

        <div class="hud hud-top">
          <div id="balancePanel" class="balance-panel" title="Dev refill balance">
            <span class="label">BALANCE</span>
            <strong id="balanceText">$10,000</strong>
          </div>
          <div>
            <span class="label">DEPTH</span>
            <strong id="depthText">0m</strong>
          </div>
          <div>
            <span class="label">RISK</span>
            <strong id="riskText">LOW</strong>
          </div>
        </div>

        <div class="result-panel hidden" id="resultPanel">
          <p id="resultKicker">READY</p>
          <h1 id="resultTitle">Deep Hook</h1>
          <p id="resultBody">Hold GO DEEP to sink. Release or pull up before the shark cuts the line.</p>
          <div id="resultBreakdown" class="result-breakdown hidden"></div>
          <button id="newRoundButton" type="button">NEW ROUND</button>
        </div>

        <div class="boss-omen-overlay hidden" id="bossOmenOverlay">
          <strong id="bossOmenTitle">CRIMSON LEVIATHAN BELOW</strong>
          <span>WARNING: Boss target appears after 80F</span>
        </div>

        <div class="controls">
          <div class="bet-panel">
            <button id="betDownButton" class="small-button" type="button" aria-label="Decrease bet">‹</button>
            <div>
              <span class="label">BET</span>
              <strong id="betText">100</strong>
            </div>
            <button id="betUpButton" class="small-button" type="button" aria-label="Increase bet">›</button>
          </div>

          <button id="deepButton" class="main-button deep-button" type="button">GO DEEP</button>
          <button id="pullButton" class="main-button pull-button" type="button">PULL UP</button>
        </div>

        <div class="hud hud-bottom">
          <div>
            <span class="label">TOTAL COST</span>
            <strong id="costText">$0</strong>
          </div>
          <div>
            <span class="label">BEST FISH</span>
            <strong id="bestFishText">-</strong>
          </div>
        </div>

        <div id="schoolRuleBoard" class="school-rule-board">
          <span>SCHOOL BONUS</span>
          <strong>1=1x 2=2x 3=5x 4=10x 5=15x 6=30x 7=50x</strong>
        </div>

        <div class="dev-panel">
          <button id="devToggleButton" class="dev-toggle" type="button">DEV</button>
          <div id="devControls" class="dev-controls hidden">
            <label class="dev-row">
              <span>DEV</span>
              <input id="sharkToggle" type="checkbox" checked />
              <strong>SHARKS</strong>
            </label>
            <label class="dev-row">
              <span>DEV</span>
              <input id="fakePlayersToggle" type="checkbox" />
              <strong>FAKE PLAYERS</strong>
            </label>
            <label class="dev-row">
              <span>DEV</span>
              <input id="goldenBubbleToggle" type="checkbox" />
              <strong>GOLD BUBBLES</strong>
            </label>
            <label class="dev-row dev-slider">
              <span>LEVIATHAN</span>
              <input id="crimsonChanceSlider" type="range" min="0" max="100" value="10" />
              <strong id="crimsonChanceText">10%</strong>
            </label>
            <label class="dev-row dev-slider">
              <span>COLLECTOR</span>
              <input id="octopusChanceSlider" type="range" min="0" max="100" value="10" />
              <strong id="octopusChanceText">10%</strong>
            </label>
            <label class="dev-row dev-slider">
              <span>PEARL CLAM</span>
              <input id="mysteryChanceSlider" type="range" min="0" max="100" value="10" />
              <strong id="mysteryChanceText">10%</strong>
            </label>
          </div>
        </div>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
